name: "Run npm dependency policy"
description: "Detect deprecated npm dependencies based on policy definition"

inputs:
  github_token:
    description: "GitHub token for reviewdog to post PR comments"
    required: false
    default: ""
  reporter:
    description: "reviewdog reporter type"
    required: false
    default: "github-pr-review"

runs:
  using: composite
  steps:
    - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
      with:
        aqua_version: v2.45.1
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
    - name: Run npm dependency policy check
      shell: bash
      run: |
        if [ ! -f package.json ]; then
          echo "package.json not found, skipping npm dependency policy check"
          exit 0
        fi

        POLICY_FILE="${{ github.action_path }}/policy.json"

        violations=""
        while IFS= read -r pkg; do
          match=$(jq -r --arg p "$pkg" '.rules[] | select(.package == $p) | "\(.reason) (alternatives: \(.alternatives | join(", ")))"' "$POLICY_FILE")
          if [ -n "$match" ]; then
            lineno=$(grep -n "\"${pkg}\"" package.json | head -1 | cut -d: -f1)
            if [ -z "$lineno" ]; then
              lineno=1
            fi
            violations="${violations}package.json:${lineno}: ${pkg}: ${match}\n"
          fi
        done < <(jq -r '(.dependencies // {}) + (.devDependencies // {}) | keys[]' package.json)

        if [ -n "${REVIEWDOG_GITHUB_API_TOKEN}" ]; then
          printf "%b" "$violations" | reviewdog -efm="%f:%l: %m" -name=npm-dependency-policy -reporter="${REPORTER}" -filter-mode=added -fail-on-error
        else
          if [ -n "$violations" ]; then
            printf "%b" "$violations"
            exit 1
          fi
        fi
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
        REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.github_token }}
        REPORTER: ${{ inputs.reporter }}
