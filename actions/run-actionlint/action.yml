name: "Run actionlint"
description: "Run actionlint with optional reviewdog integration"

inputs:
  github_token:
    description: "GitHub token for reviewdog to post PR comments"
    required: false
    default: ""
  reporter:
    description: "reviewdog reporter type"
    required: false
    default: "github-pr-review"

runs:
  using: composite
  steps:
    - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
      with:
        aqua_version: v2.45.1
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
    - name: Run actionlint
      shell: bash
      run: |
        if [ -n "${REVIEWDOG_GITHUB_API_TOKEN}" ]; then
          actionlint | tee "${RUNNER_TEMP}/actionlint-output.log" | reviewdog -efm="%f:%l:%c: %m" -name=actionlint -reporter="${REPORTER}" -filter-mode=added -fail-on-error
        else
          actionlint -color
        fi
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
        REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.github_token }}
        REPORTER: ${{ inputs.reporter }}
    - name: Show actionlint output
      if: failure()
      shell: bash
      run: |
        if [ -s "${RUNNER_TEMP}/actionlint-output.log" ]; then
          cat "${RUNNER_TEMP}/actionlint-output.log"
        fi
