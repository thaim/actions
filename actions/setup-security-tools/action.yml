name: "Security Tools Check"
description: "Run ghalint, actionlint, and zizmor security checks"

inputs:
  github_token:
    description: "GitHub token for reviewdog to post PR comments"
    required: false
    default: ""
  reporter:
    description: "reviewdog reporter type"
    required: false
    default: "github-pr-review"

runs:
  using: composite
  steps:
    - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
      with:
        aqua_version: v2.45.1
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
    - name: Run ghalint
      shell: bash
      run: ghalint run
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
    - name: Run zizmor
      shell: bash
      run: |
        if [ -n "${REVIEWDOG_GITHUB_API_TOKEN}" ]; then
          zizmor --offline --format=sarif . | reviewdog -f=sarif -reporter="${REPORTER}" -filter-mode=added -fail-on-error
        else
          zizmor --offline .
        fi
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
        REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.github_token }}
        REPORTER: ${{ inputs.reporter }}
    - name: Run actionlint
      shell: bash
      run: |
        if [ -n "${REVIEWDOG_GITHUB_API_TOKEN}" ]; then
          actionlint | reviewdog -efm="%f:%l:%c: %m" -name=actionlint -reporter="${REPORTER}" -filter-mode=added -fail-on-error
        else
          actionlint -color
        fi
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
        REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.github_token }}
        REPORTER: ${{ inputs.reporter }}
