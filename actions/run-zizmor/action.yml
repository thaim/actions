name: "Run zizmor"
description: "Run zizmor with optional reviewdog integration"

inputs:
  github_token:
    description: "GitHub token for reviewdog to post PR comments"
    required: false
    default: ""
  reporter:
    description: "reviewdog reporter type"
    required: false
    default: "github-pr-review"

runs:
  using: composite
  steps:
    - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
      with:
        aqua_version: v2.45.1
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
    - name: Run zizmor
      shell: bash
      run: |
        if [ -n "${REVIEWDOG_GITHUB_API_TOKEN}" ]; then
          zizmor --offline --format=sarif . > "${RUNNER_TEMP}/zizmor-output.sarif"
          reviewdog -f=sarif -reporter="${REPORTER}" -filter-mode=added -fail-on-error < "${RUNNER_TEMP}/zizmor-output.sarif" || true
        else
          zizmor --offline .
        fi
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
        REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.github_token }}
        REPORTER: ${{ inputs.reporter }}
    - name: Show zizmor output
      if: always()
      shell: bash
      run: |
        if [ -s "${RUNNER_TEMP}/zizmor-output.sarif" ]; then
          jq -r '.runs[].results[] | "\(.locations[].physicalLocation.artifactLocation.uri):\(.locations[].physicalLocation.region.startLine): \(.message.text)"' "${RUNNER_TEMP}/zizmor-output.sarif" || cat "${RUNNER_TEMP}/zizmor-output.sarif"
        fi
