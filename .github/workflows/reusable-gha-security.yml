# Reusable workflow for GitHub Actions security checks.
# Usage:
#   jobs:
#     security:
#       uses: thaim/actions/.github/workflows/reusable-gha-security.yml@main
#
# Checks:
#   - actionlint: Lints workflow YAML files
#   - ghalint: Checks GitHub Actions security best practices
#   - zizmor: Detects security vulnerabilities in GitHub Actions workflows
name: Reusable GitHub Actions Security Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  security-checks:
    name: GitHub Actions Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: aquaproj/aqua-installer@e2d97f7b2c3d16fd0dc16ce06c3c4cf1aa5f4a14 # v4.0.0
        with:
          aqua_version: v2.45.1
      - name: Run ghalint
        run: ghalint run
      - name: Run zizmor
        run: zizmor --offline .
      - name: Run actionlint
        run: actionlint -color
