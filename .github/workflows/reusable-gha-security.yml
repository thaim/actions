# Reusable workflow for GitHub Actions security checks.
# Usage:
#   jobs:
#     security:
#       uses: thaim/actions/.github/workflows/reusable-gha-security.yml@v1.0.0
#
# Checks:
#   - actionlint: Lints workflow YAML files
#   - ghalint: Checks GitHub Actions security best practices
#   - zizmor: Detects security vulnerabilities in GitHub Actions workflows
#
# Note:
#   This workflow uses individual composite actions (run-ghalint, run-zizmor,
#   run-actionlint) with absolute references because reusable workflows resolve
#   relative paths against the caller repository, not this repository.
name: Reusable GitHub Actions Security Checks

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  security-checks:
    name: GitHub Actions Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: ghalint
        uses: thaim/actions/actions/run-ghalint@b74965c3a29b05f4fef59a2f68af34970ef5e389 # fix-audit-error
        continue-on-error: true
        with:
          github_token: ${{ github.token }}
      - id: zizmor
        uses: thaim/actions/actions/run-zizmor@b74965c3a29b05f4fef59a2f68af34970ef5e389 # fix-audit-error
        continue-on-error: true
        with:
          github_token: ${{ github.token }}
      - id: actionlint
        uses: thaim/actions/actions/run-actionlint@b74965c3a29b05f4fef59a2f68af34970ef5e389 # fix-audit-error
        continue-on-error: true
        with:
          github_token: ${{ github.token }}
      - name: Check results
        if: always()
        env:
          GHALINT_OUTCOME: ${{ steps.ghalint.outcome }}
          ZIZMOR_OUTCOME: ${{ steps.zizmor.outcome }}
          ACTIONLINT_OUTCOME: ${{ steps.actionlint.outcome }}
        run: |
          if [ "$GHALINT_OUTCOME" = "failure" ] || \
             [ "$ZIZMOR_OUTCOME" = "failure" ] || \
             [ "$ACTIONLINT_OUTCOME" = "failure" ]; then
            echo "::error::One or more security checks failed"
            exit 1
          fi
