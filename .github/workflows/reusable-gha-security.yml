# Reusable workflow for GitHub Actions security checks.
# Usage:
#   jobs:
#     security:
#       uses: thaim/actions/.github/workflows/reusable-gha-security.yml@v1
#
# Checks:
#   - actionlint: Lints workflow YAML files
#   - ghalint: Checks GitHub Actions security best practices
#   - zizmor: Detects security vulnerabilities in GitHub Actions workflows
name: Reusable GitHub Actions Security Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  security-checks:
    name: GitHub Actions Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.45.1
      - name: Run ghalint
        run: ghalint run
      - name: Run zizmor
        run: zizmor --offline .
      - name: Run actionlint
        run: actionlint -color
