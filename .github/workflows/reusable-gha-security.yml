# Reusable workflow for GitHub Actions security checks.
# Usage:
#   jobs:
#     security:
#       uses: thaim/actions/.github/workflows/reusable-gha-security.yml@v1.0.0
#
# Checks:
#   - actionlint: Lints workflow YAML files
#   - ghalint: Checks GitHub Actions security best practices
#   - zizmor: Detects security vulnerabilities in GitHub Actions workflows
#
# Note:
#   This workflow uses thaim/actions/actions/setup-security-tools composite action
#   with an absolute reference because reusable workflows resolve relative paths
#   against the caller repository, not this repository.
name: Reusable GitHub Actions Security Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  security-checks:
    name: GitHub Actions Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: thaim/actions/actions/setup-security-tools@setup-security-ci
