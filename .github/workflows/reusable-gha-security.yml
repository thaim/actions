name: Reusable GitHub Actions Security Checks

on:
  workflow_call:

jobs:
  pinact-verify:
    name: Verify GitHub Actions are pinned
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with:
          skip_push: "true"
          verify: "true"

  actionlint:
    name: Lint GitHub Actions workflow files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  policy-as-code:
    name: Policy as Code (placeholder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Policy as Code check
        run: echo "policy as code: not implemented yet"
