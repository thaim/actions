# Reusable workflow for GitHub Actions security checks.
# Usage:
#   jobs:
#     security:
#       uses: thaim/actions/.github/workflows/reusable-gha-security.yml@v1.0.0
#
# Checks:
#   - actionlint: Lints workflow YAML files
#   - ghalint: Checks GitHub Actions security best practices
#   - zizmor: Detects security vulnerabilities in GitHub Actions workflows
#
# Note:
#   This workflow uses individual composite actions (run-ghalint, run-zizmor,
#   run-actionlint) with absolute references because reusable workflows resolve
#   relative paths against the caller repository, not this repository.
name: Reusable GitHub Actions Security Checks

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  security-checks:
    name: GitHub Actions Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: thaim/actions/actions/run-ghalint@c1a2592cb0d28b300f51fbd9e878dbaf95e87661 # refactor/split-security-tools-action
        with:
          github_token: ${{ github.token }}
      - uses: thaim/actions/actions/run-zizmor@c1a2592cb0d28b300f51fbd9e878dbaf95e87661 # refactor/split-security-tools-action
        with:
          github_token: ${{ github.token }}
      - uses: thaim/actions/actions/run-actionlint@c1a2592cb0d28b300f51fbd9e878dbaf95e87661 # refactor/split-security-tools-action
        with:
          github_token: ${{ github.token }}
