# Reusable workflow for GitHub Actions security checks.
# Usage:
#   jobs:
#     security:
#       uses: thaim/actions/.github/workflows/reusable-gha-security.yml@main
#
# Checks:
#   - pinact: Verifies all Actions are pinned to full-length commit SHA
#   - actionlint: Lints workflow YAML files
#
# All jobs run in parallel as they are independent of each other.
name: Reusable GitHub Actions Security Checks

on:
  workflow_call:
    inputs:
      runs-on:
        description: "Runner label"
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  pinact-verify:
    name: Verify GitHub Actions are pinned
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with:
          skip_push: true
          verify: true

  actionlint:
    name: Lint GitHub Actions workflow files
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.7@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9
        with:
          args: -color
