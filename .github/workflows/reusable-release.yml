# Reusable workflow for automated release management using tagpr.
# Usage:
#   on:
#     push:
#       branches: [main]
#
#   jobs:
#     release:
#       uses: thaim/actions/.github/workflows/reusable-release.yml@v1.0.2
#
# Features:
#   - Songmu/tagpr: Automatically creates release PRs and tags on push to main
name: Reusable Release

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  tagpr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: Songmu/tagpr@9bbb945b2fb025126186661e27d55485e3fc6df6 # v1.18.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
