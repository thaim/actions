# Reusable workflow for PR title validation and label assignment.
# Usage:
#   on:
#     pull_request:
#       types: [opened, edited, synchronize]
#
#   jobs:
#     pr-check:
#       uses: thaim/actions/.github/workflows/reusable-pr-check.yml@v1.0.2
#
# Inputs (optional):
#   - types: Newline-separated list of allowed conventional commit types
#   - type_labels: JSON object mapping each type to a label name
#
# Note:
#   Keep `types` and `type_labels` consistent. A type listed in `types` but
#   missing from `type_labels` will receive the default "other" label, which
#   defeats the purpose of this workflow.
#
# Checks:
#   - amannn/action-semantic-pull-request: Validates PR title follows conventional commit format
#   - actions/github-script: Assigns labels based on PR title type, updating labels only when there is a diff
name: Reusable PR Check

on:
  workflow_call:
    inputs:
      types:
        description: "Newline-separated list of allowed conventional commit types"
        required: false
        type: string
        default: |
          feat
          fix
          ci
          docs
          refactor
          chore
      type_labels:
        description: "JSON object mapping conventional commit types to label names"
        required: false
        type: string
        default: |
          {
            "feat": "enhancement",
            "fix": "bug",
            "ci": "ci",
            "docs": "documentation",
            "refactor": "refactor",
            "chore": "chore"
          }

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: ${{ inputs.types }}
      - name: Update labels based on PR title
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          TYPE_LABELS: ${{ inputs.type_labels }}
        with:
          github-token: ${{ github.token }}
          script: |
            const typeLabels = JSON.parse(process.env.TYPE_LABELS);
            const title = context.payload.pull_request.title;
            const match = title.match(/^(?<type>[a-zA-Z]+)(?:\([^)]+\))?!?:/);
            const type = match && match.groups && match.groups.type;
            const desiredLabel = (type && typeLabels[type]) ? typeLabels[type] : 'other';

            const currentLabels = context.payload.pull_request.labels.map(l => l.name);
            const managedLabels = new Set([...Object.values(typeLabels), 'other']);

            const removeTargets = currentLabels.filter(
              name => managedLabels.has(name) && name !== desiredLabel
            );
            const shouldAdd = !currentLabels.includes(desiredLabel);

            if (removeTargets.length === 0 && !shouldAdd) {
              console.log('Labels already up-to-date');
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            for (const name of removeTargets) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (e) {
                if (e.status !== 404) {
                  throw e;
                }
              }
            }

            if (shouldAdd) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [desiredLabel],
              });
            }
